<!DOCTYPE html>
<html lang="en">
 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review toevoegen</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      width: 100%;
      max-width: 450px;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 28px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      color: #555;
      font-weight: 600;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="number"],
    select,
    textarea {
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      fonts-family: inherit;
      transition: all 0.3s ease;
      background-color: #f9f9f9;
    }

    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      background-color: white;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    input[type="number"] {
      padding-right: 40px;
    }

    select {
      cursor: pointer;
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 20px;
      padding-right: 40px;
    }

    input[type="number"]::placeholder {
      color: #999;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 14px 28px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    button[type="submit"] {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
    }

    button[type="submit"]:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .container {
        padding: 25px;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 20px;
      }

      form {
        gap: 18px;
      }

      button {
        padding: 12px 20px;
        font-size: 14px;
      }
    }
  </style>
</head>
 
<body>
  <div class="container">
    <h1>⭐ Geef je review</h1>
    <form action="./rooms/" method="post">
 
      <div class="form-group">
        <label for="rating">Beoordeling (1 t/m 5)</label>
        <input type="number" id="rating" name="rating" min="1" max="5" placeholder="Vul cijfer in (1-5)" required />
      </div>
 
      <div class="form-group">
        <label for="difficulty">Moeilijkheid</label>
        <select id="difficulty" name="difficulty" required>
          <option value="">-- Kies --</option>
          <option value="makkelijk">🟢 Makkelijk</option>
          <option value="normaal">🟡 Normaal</option>
          <option value="moeilijk">🔴 Moeilijk</option>
        </select>
      </div>
 
      <div class="form-group">
        <label for="comment">Je review (feedback)</label>
        <textarea id="comment" name="comment" rows="5" placeholder="Vertel ons wat je van deze room vond..." required></textarea>
      </div>
 
      <div class="button-group">
        <button type="submit" name="save_review">✓ Review opslaan</button>
      </div>
 
    </form>
  </div>
</body>
 
</html>
